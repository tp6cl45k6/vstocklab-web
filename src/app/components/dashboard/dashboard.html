<div class="dashboard-container" *ngIf="accountSummary$ | async as summary; else loading">
  <h2 class="section-title">еёіиҷҹиіҮйҮ‘зӢҖж…Ӣ</h2>

  <div class="card-grid">
    <!-- еёіжҲ¶йӨҳйЎҚ -->
    <div class="stat-card">
      <div class="card-title">еёіжҲ¶йӨҳйЎҚ</div>
      <div class="card-value highlight-blue">
        {{ summary.balance | currency:'TWD':'symbol':'1.0-0' }}
      </div>
    </div>

    <!-- иӮЎзҘЁеёӮеҖј -->
    <div class="stat-card">
      <div class="card-title">иӮЎзҘЁзёҪеёӮеҖј</div>
      <div class="card-value">
        {{ summary.stockValue | currency:'TWD':'symbol':'1.0-0' }}
      </div>
    </div>

    <!-- дәӨеүІйҮ‘йЎҚ -->
    <div class="stat-card" [class.alert]="summary.settlementAmount < 0">
      <div class="card-title">T+2 й җдј°дәӨеүІйҮ‘йЎҚ</div>
      <div class="card-value">
        {{ summary.settlementAmount | currency:'TWD':'symbol':'1.0-0' }}
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <div class="loading-state">
    иіҮж–ҷеҗҢжӯҘдёӯпјҢи«ӢзЁҚеҖҷ...
  </div>
</ng-template>
